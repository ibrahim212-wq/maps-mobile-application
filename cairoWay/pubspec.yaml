name: routemind
description: RouteMind — smart traffic prediction for Cairo & Giza
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  mapbox_maps_flutter: ^2.22.0
  flutter_riverpod: ^2.6.1
  http: ^1.2.2
  geolocator: ^14.0.0
  flutter_tts: ^4.2.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0
  shared_preferences: ^2.3.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_dotenv: ^5.2.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
